# AI 服务配置示例 — 复制为 ai_config.local.yaml 后在软件「设置」中填写
# 设置页可选服务商预设：openai | volcengine | custom

provider: openai_compatible
provider_preset: openai
api_key: ""
base_url: ""
model: ""

analysis:
  language: zh-CN
  # 留空则按 language 自动选择 prompts/style_analysis.txt 或 .en.txt
  prompt_file: ""
  lut_min_confidence: 0.35
  xmp_min_confidence: 0.25
  use_json_mode: true
  max_retries: 2
  # 路线 B：分类 → 匹配配方 → 微调（默认开启；可在设置页关闭）
  use_recipe_pipeline: true
  # classify_prompt_file: ""
  # refine_prompt_file: ""
