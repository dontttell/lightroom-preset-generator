# AI 服务配置示例 — 复制为 ai_config.local.yaml 后在软件「设置」中填写
# UI 仅暴露 API Key / Base URL / 模型；provider 由程序写入 openai_compatible

provider: ""
api_key: ""
base_url: ""
model: ""

analysis:
  language: zh-CN
  # 留空则按 language 自动选择 prompts/style_analysis.txt 或 .en.txt
  prompt_file: ""
  lut_min_confidence: 0.35
  xmp_min_confidence: 0.25
  use_json_mode: true
  max_retries: 2
